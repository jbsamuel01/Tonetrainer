<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tonalités par altérations</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #0f172a;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.18);
      --muted: #475569;
      --border: #cbd5e1;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #020617;
        --panel: #0f172a;
        --text: #e2e8f0;
        --accent: #60a5fa;
        --accent-soft: rgba(96, 165, 250, 0.2);
        --muted: #94a3b8;
        --border: #334155;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    main {
      width: min(840px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.14);
    }

    h1 { margin: 0 0 0.5rem; font-size: clamp(1.35rem, 2.1vw, 1.8rem); }

    .hint { margin: 0 0 1rem; color: var(--muted); }

    .buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(94px, 1fr));
      gap: 0.55rem;
    }

    .count-btn {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: inherit;
      font-size: 1rem;
      font-weight: 650;
      padding: 0.75rem 0.45rem;
      cursor: pointer;
      transition: transform 0.08s ease, border-color 0.16s ease, background-color 0.16s ease;
    }

    .count-btn:hover { border-color: var(--accent); }
    .count-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .count-btn[aria-pressed="true"] { background-color: var(--accent-soft); border-color: var(--accent); }
    .count-btn:active { transform: scale(0.98); }

    .results {
      margin-top: 1.1rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      background: rgba(148, 163, 184, 0.08);
    }

    .label { color: var(--muted); font-size: 0.95rem; margin: 0 0 0.2rem; }
    .value { margin: 0 0 0.8rem; font-size: clamp(1.25rem, 2.7vw, 1.85rem); font-weight: 700; }
    .value:last-child { margin-bottom: 0; }
    .selected { margin: 0 0 0.8rem; font-size: 1rem; color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>Tonalité selon le nombre d'altérations</h1>
    <p class="hint">Un clic sur une valeur suffit : bémols à gauche, dièses à droite.</p>

    <section class="buttons" id="buttons" aria-label="Nombre d'altérations">
      <button type="button" class="count-btn" data-accidentals="-7" aria-pressed="false">7♭</button>
      <button type="button" class="count-btn" data-accidentals="-6" aria-pressed="false">6♭</button>
      <button type="button" class="count-btn" data-accidentals="-5" aria-pressed="false">5♭</button>
      <button type="button" class="count-btn" data-accidentals="-4" aria-pressed="false">4♭</button>
      <button type="button" class="count-btn" data-accidentals="-3" aria-pressed="false">3♭</button>
      <button type="button" class="count-btn" data-accidentals="-2" aria-pressed="false">2♭</button>
      <button type="button" class="count-btn" data-accidentals="-1" aria-pressed="false">1♭</button>
      <button type="button" class="count-btn" data-accidentals="0" aria-pressed="false">0</button>
      <button type="button" class="count-btn" data-accidentals="1" aria-pressed="false">1♯</button>
      <button type="button" class="count-btn" data-accidentals="2" aria-pressed="false">2♯</button>
      <button type="button" class="count-btn" data-accidentals="3" aria-pressed="false">3♯</button>
      <button type="button" class="count-btn" data-accidentals="4" aria-pressed="false">4♯</button>
      <button type="button" class="count-btn" data-accidentals="5" aria-pressed="false">5♯</button>
      <button type="button" class="count-btn" data-accidentals="6" aria-pressed="false">6♯</button>
      <button type="button" class="count-btn" data-accidentals="7" aria-pressed="false">7♯</button>
    </section>

    <section class="results" aria-live="polite">
      <p class="selected" id="selected"></p>
      <p class="label">Tonalité majeure</p>
      <p class="value" id="major"></p>
      <p class="label">Relative mineure</p>
      <p class="value" id="minor"></p>
    </section>
  </main>

  <script>
    var keysByAccidentals = {
      '-7': { major: 'Do♭ majeur', minor: 'La♭ mineur' },
      '-6': { major: 'Sol♭ majeur', minor: 'Mi♭ mineur' },
      '-5': { major: 'Ré♭ majeur', minor: 'Si♭ mineur' },
      '-4': { major: 'La♭ majeur', minor: 'Fa mineur' },
      '-3': { major: 'Mi♭ majeur', minor: 'Do mineur' },
      '-2': { major: 'Si♭ majeur', minor: 'Sol mineur' },
      '-1': { major: 'Fa majeur', minor: 'Ré mineur' },
      '0': { major: 'Do majeur', minor: 'La mineur' },
      '1': { major: 'Sol majeur', minor: 'Mi mineur' },
      '2': { major: 'Ré majeur', minor: 'Si mineur' },
      '3': { major: 'La majeur', minor: 'Fa♯ mineur' },
      '4': { major: 'Mi majeur', minor: 'Do♯ mineur' },
      '5': { major: 'Si majeur', minor: 'Sol♯ mineur' },
      '6': { major: 'Fa♯ majeur', minor: 'Ré♯ mineur' },
      '7': { major: 'Do♯ majeur', minor: 'La♯ mineur' }
    };

    var majorEl = document.getElementById('major');
    var minorEl = document.getElementById('minor');
    var selectedEl = document.getElementById('selected');
    var buttons = document.getElementsByClassName('count-btn');

    function formatLabel(n) {
      if (n === 0) return 'Aucune altération';
      if (n > 0) return n + ' dièse' + (n > 1 ? 's' : '');
      var flats = Math.abs(n);
      return flats + ' bémol' + (flats > 1 ? 's' : '');
    }

    function setSelection(n) {
      var key = keysByAccidentals[String(n)];
      if (!key) return;

      for (var i = 0; i < buttons.length; i += 1) {
        var value = Number(buttons[i].getAttribute('data-accidentals'));
        buttons[i].setAttribute('aria-pressed', value === n ? 'true' : 'false');
      }

      selectedEl.textContent = 'Altérations sélectionnées : ' + formatLabel(n);
      majorEl.textContent = key.major;
      minorEl.textContent = key.minor;
    }

    function onButtonClick(event) {
      var btn = event.currentTarget;
      var value = Number(btn.getAttribute('data-accidentals'));
      setSelection(value);
    }

    for (var i = 0; i < buttons.length; i += 1) {
      buttons[i].addEventListener('click', onButtonClick);
    }

    setSelection(0);
  </script>
</body>
</html>
